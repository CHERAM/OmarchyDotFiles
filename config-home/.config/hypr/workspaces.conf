# Local dual-monitor workspace overrides.
#
# Hyprland workspaces are single-monitor objects, so numbered workspaces are
# mirrored as synced pairs:
# - left monitor:  1-10
# - right monitor: 101-110
#
# The helper scripts keep both monitors in lockstep when using the number binds.

unbind = SUPER, code:10
unbind = SUPER, code:11
unbind = SUPER, code:12
unbind = SUPER, code:13
unbind = SUPER, code:14
unbind = SUPER, code:15
unbind = SUPER, code:16
unbind = SUPER, code:17
unbind = SUPER, code:18
unbind = SUPER, code:19

unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19

unbind = SUPER SHIFT ALT, code:10
unbind = SUPER SHIFT ALT, code:11
unbind = SUPER SHIFT ALT, code:12
unbind = SUPER SHIFT ALT, code:13
unbind = SUPER SHIFT ALT, code:14
unbind = SUPER SHIFT ALT, code:15
unbind = SUPER SHIFT ALT, code:16
unbind = SUPER SHIFT ALT, code:17
unbind = SUPER SHIFT ALT, code:18
unbind = SUPER SHIFT ALT, code:19

unbind = SUPER SHIFT ALT, LEFT
unbind = SUPER SHIFT ALT, RIGHT
unbind = SUPER CTRL, LEFT
unbind = SUPER CTRL, RIGHT
unbind = SUPER, TAB
unbind = SUPER SHIFT, TAB
unbind = SUPER, mouse_down
unbind = SUPER, mouse_up

bindd = SUPER, code:10, Switch synced workspace 1, exec, ~/.config/hypr/scripts/workspace-sync.sh switch 1
bindd = SUPER, code:11, Switch synced workspace 2, exec, ~/.config/hypr/scripts/workspace-sync.sh switch 2
bindd = SUPER, code:12, Switch synced workspace 3, exec, ~/.config/hypr/scripts/workspace-sync.sh switch 3
bindd = SUPER, code:13, Switch synced workspace 4, exec, ~/.config/hypr/scripts/workspace-sync.sh switch 4
bindd = SUPER, code:14, Switch synced workspace 5, exec, ~/.config/hypr/scripts/workspace-sync.sh switch 5
bindd = SUPER, code:15, Switch synced workspace 6, exec, ~/.config/hypr/scripts/workspace-sync.sh switch 6
bindd = SUPER, code:16, Switch synced workspace 7, exec, ~/.config/hypr/scripts/workspace-sync.sh switch 7
bindd = SUPER, code:17, Switch synced workspace 8, exec, ~/.config/hypr/scripts/workspace-sync.sh switch 8
bindd = SUPER, code:18, Switch synced workspace 9, exec, ~/.config/hypr/scripts/workspace-sync.sh switch 9
bindd = SUPER, code:19, Switch synced workspace 10, exec, ~/.config/hypr/scripts/workspace-sync.sh switch 10

bindd = SUPER SHIFT, code:10, Move window to synced workspace 1, exec, ~/.config/hypr/scripts/workspace-sync.sh move 1
bindd = SUPER SHIFT, code:11, Move window to synced workspace 2, exec, ~/.config/hypr/scripts/workspace-sync.sh move 2
bindd = SUPER SHIFT, code:12, Move window to synced workspace 3, exec, ~/.config/hypr/scripts/workspace-sync.sh move 3
bindd = SUPER SHIFT, code:13, Move window to synced workspace 4, exec, ~/.config/hypr/scripts/workspace-sync.sh move 4
bindd = SUPER SHIFT, code:14, Move window to synced workspace 5, exec, ~/.config/hypr/scripts/workspace-sync.sh move 5
bindd = SUPER SHIFT, code:15, Move window to synced workspace 6, exec, ~/.config/hypr/scripts/workspace-sync.sh move 6
bindd = SUPER SHIFT, code:16, Move window to synced workspace 7, exec, ~/.config/hypr/scripts/workspace-sync.sh move 7
bindd = SUPER SHIFT, code:17, Move window to synced workspace 8, exec, ~/.config/hypr/scripts/workspace-sync.sh move 8
bindd = SUPER SHIFT, code:18, Move window to synced workspace 9, exec, ~/.config/hypr/scripts/workspace-sync.sh move 9
bindd = SUPER SHIFT, code:19, Move window to synced workspace 10, exec, ~/.config/hypr/scripts/workspace-sync.sh move 10

bindd = SUPER SHIFT ALT, code:10, Move window silently to synced workspace 1, exec, ~/.config/hypr/scripts/workspace-sync.sh move-silent 1
bindd = SUPER SHIFT ALT, code:11, Move window silently to synced workspace 2, exec, ~/.config/hypr/scripts/workspace-sync.sh move-silent 2
bindd = SUPER SHIFT ALT, code:12, Move window silently to synced workspace 3, exec, ~/.config/hypr/scripts/workspace-sync.sh move-silent 3
bindd = SUPER SHIFT ALT, code:13, Move window silently to synced workspace 4, exec, ~/.config/hypr/scripts/workspace-sync.sh move-silent 4
bindd = SUPER SHIFT ALT, code:14, Move window silently to synced workspace 5, exec, ~/.config/hypr/scripts/workspace-sync.sh move-silent 5
bindd = SUPER SHIFT ALT, code:15, Move window silently to synced workspace 6, exec, ~/.config/hypr/scripts/workspace-sync.sh move-silent 6
bindd = SUPER SHIFT ALT, code:16, Move window silently to synced workspace 7, exec, ~/.config/hypr/scripts/workspace-sync.sh move-silent 7
bindd = SUPER SHIFT ALT, code:17, Move window silently to synced workspace 8, exec, ~/.config/hypr/scripts/workspace-sync.sh move-silent 8
bindd = SUPER SHIFT ALT, code:18, Move window silently to synced workspace 9, exec, ~/.config/hypr/scripts/workspace-sync.sh move-silent 9
bindd = SUPER SHIFT ALT, code:19, Move window silently to synced workspace 10, exec, ~/.config/hypr/scripts/workspace-sync.sh move-silent 10

bindd = SUPER SHIFT ALT, LEFT, Move window to left monitor on matching workspace, exec, ~/.config/hypr/scripts/workspace-sync.sh move-monitor-left
bindd = SUPER SHIFT ALT, RIGHT, Move window to right monitor on matching workspace, exec, ~/.config/hypr/scripts/workspace-sync.sh move-monitor-right
bindd = SUPER CTRL, LEFT, Focus left monitor, focusmonitor, l
bindd = SUPER CTRL, RIGHT, Focus right monitor, focusmonitor, r

bindd = SUPER, TAB, Next synced workspace, exec, ~/.config/hypr/scripts/workspace-sync.sh switch-next
bindd = SUPER SHIFT, TAB, Previous synced workspace, exec, ~/.config/hypr/scripts/workspace-sync.sh switch-prev
bindd = SUPER, mouse_down, Next synced workspace, exec, ~/.config/hypr/scripts/workspace-sync.sh switch-next
bindd = SUPER, mouse_up, Previous synced workspace, exec, ~/.config/hypr/scripts/workspace-sync.sh switch-prev
